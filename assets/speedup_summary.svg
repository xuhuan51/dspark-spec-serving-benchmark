<svg width="980" height="380" viewBox="0 0 980 380" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Serving speedup summary">
  <rect width="980" height="380" rx="18" fill="#FFFFFF"/>
  <rect x="1" y="1" width="978" height="378" rx="17" stroke="#CBD5E1"/>

  <text x="42" y="48" fill="#0F172A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="700">End-to-End Serving Speedup</text>
  <text x="42" y="76" fill="#475569" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">Measured through OpenAI-compatible baseline/speculative serving endpoints</text>

  <g font-family="Inter,Segoe UI,Arial,sans-serif">
    <line x1="190" y1="298" x2="890" y2="298" stroke="#CBD5E1" stroke-width="2"/>
    <line x1="190" y1="122" x2="190" y2="298" stroke="#CBD5E1" stroke-width="2"/>

    <text x="190" y="324" fill="#64748B" font-size="12" text-anchor="middle">1.0x</text>
    <text x="365" y="324" fill="#64748B" font-size="12" text-anchor="middle">1.2x</text>
    <text x="540" y="324" fill="#64748B" font-size="12" text-anchor="middle">1.4x</text>
    <text x="715" y="324" fill="#64748B" font-size="12" text-anchor="middle">1.6x</text>
    <text x="890" y="324" fill="#64748B" font-size="12" text-anchor="middle">1.8x</text>

    <line x1="365" y1="122" x2="365" y2="298" stroke="#E2E8F0"/>
    <line x1="540" y1="122" x2="540" y2="298" stroke="#E2E8F0"/>
    <line x1="715" y1="122" x2="715" y2="298" stroke="#E2E8F0"/>
    <line x1="890" y1="122" x2="890" y2="298" stroke="#E2E8F0"/>

    <text x="42" y="151" fill="#0F172A" font-size="14" font-weight="700">Qwen3-8B BF16</text>
    <text x="42" y="171" fill="#64748B" font-size="12">single A30, breakpoint ~c=26</text>
    <rect x="190" y="134" width="665" height="34" rx="8" fill="#06B6D4"/>
    <text x="872" y="156" fill="#0F172A" font-size="15" font-weight="700">1.76x</text>

    <text x="42" y="219" fill="#0F172A" font-size="14" font-weight="700">Qwen3-32B BF16</text>
    <text x="42" y="239" fill="#64748B" font-size="12">TP8, breakpoint ~c=8</text>
    <rect x="190" y="202" width="499" height="34" rx="8" fill="#22C55E"/>
    <text x="706" y="224" fill="#0F172A" font-size="15" font-weight="700">1.57x</text>

    <text x="42" y="287" fill="#0F172A" font-size="14" font-weight="700">Qwen3-32B INT4</text>
    <text x="42" y="307" fill="#64748B" font-size="12">TP4, breakpoint ~c=5</text>
    <rect x="190" y="270" width="376" height="34" rx="8" fill="#F97316"/>
    <text x="583" y="292" fill="#0F172A" font-size="15" font-weight="700">1.43x</text>

    <rect x="42" y="344" width="896" height="1" fill="#E2E8F0"/>
    <text x="42" y="364" fill="#475569" font-size="12">Speedup is strongest in low-to-moderate concurrency regions where decode remains the serving bottleneck.</text>
  </g>
</svg>
